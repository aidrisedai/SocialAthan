kind = "mobile"
previewPath = "/"
title = "Athan + Jama'ah"
version = "1.0.0"
id = "artifacts/athan-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19478

[services.development]
run = "pnpm --filter @workspace/athan-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/athan-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/athan-app", "run", "serve" ]

[services.env]
PORT = "19478"
BASE_PATH = "/"
